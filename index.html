<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Vida - Tabuleiro das Casinhas 🏠</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="isometrico.css">
    <link rel="stylesheet" href="game-effects.css">
    <link rel="stylesheet" href="game-board.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <h1>🏠 Jogo da Vida</h1>
            <p>Tabuleiro das Casinhas</p>
            
            <div class="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Senha" required>
                
                <button id="loginBtn" class="btn-primary">🔑 Entrar</button>
                <button id="registerBtn" class="btn-secondary">📝 Criar Conta</button>
            </div>
            
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- CHARACTER SELECT SCREEN -->
    <div id="characterScreen" class="screen">
        <div class="char-container">
            <h1>🎮 Escolha seu Dedal</h1>
            <p>Qual será seu personagem?</p>
            
            <div class="characters-grid">
                <div class="character-card" data-char="1">
                    <div class="char-icon">🚗</div>
                    <p>Carro Vermelho</p>
                </div>
                <div class="character-card" data-char="2">
                    <div class="char-icon">💎</div>
                    <p>Chapéu de Seda</p>
                </div>
                <div class="character-card" data-char="3">
                    <div class="char-icon">⌚</div>
                    <p>Relógio de Ouro</p>
                </div>
                <div class="character-card" data-char="4">
                    <div class="char-icon">🐶</div>
                    <p>Cachorro</p>
                </div>
                <div class="character-card" data-char="5">
                    <div class="char-icon">🎩</div>
                    <p>Cartola</p>
                </div>
                <div class="character-card" data-char="6">
                    <div class="char-icon">👑</div>
                    <p>Coroa</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div class="container">
            <!-- HEADER COM PROFILE -->
            <header class="header">
                <div class="profile-info">
                    <div class="character-display" id="characterDisplay">🚗</div>
                    <div class="user-info">
                        <p id="userName">Usuário</p>
                        <p id="userEmail">email@example.com</p>
                    </div>
                </div>

