<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jogo das Casinhas">
    <title>Jogo das Casinhas - Tabuleiro de Economia 🏠</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="isometrico.css">
    <link rel="stylesheet" href="game-effects.css">
    <link rel="stylesheet" href="game-board.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <h1>🏠 Jogo das Casinhas</h1>
            <p>Tabuleiro de Economia</p>
            
            <div class="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Senha" required>
                
                <button id="loginBtn" class="btn-primary">🔑 Entrar</button>
                <button id="registerBtn" class="btn-secondary">📝 Criar Conta</button>
            </div>
            
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- CHARACTER SELECT SCREEN -->
    <div id="characterScreen" class="screen">
        <div class="char-container">
            <h1>🎮 Escolha seu Dedal</h1>
            <p>Qual será seu personagem?</p>
            
            <div class="characters-grid">
                <div class="character-card" data-char="1">
                    <div class="char-icon">🚗</div>
                    <p>Carro Vermelho</p>
                </div>
                <div class="character-card" data-char="2">
                    <div class="char-icon">💎</div>
                    <p>Chapéu de Seda</p>
                </div>
                <div class="character-card" data-char="3">
                    <div class="char-icon">⌚</div>
                    <p>Relógio de Ouro</p>
                </div>
                <div class="character-card" data-char="4">
                    <div class="char-icon">🐶</div>
                    <p>Cachorro</p>
                </div>
                <div class="character-card" data-char="5">
                    <div class="char-icon">🎩</div>
                    <p>Cartola</p>
                </div>
                <div class="character-card" data-char="6">
                    <div class="char-icon">👑</div>
                    <p>Coroa</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <!-- HEADER -->
        <header class="interland-header">
            <div class="header-left">
                <div class="logo-section">
                    <span class="logo-emoji">🏠</span>
                    <span class="logo-text">Jogo das Casinhas</span>
                </div>
            </div>

            <div class="header-middle">
                <div class="progress-mini">
                    <span class="progress-label">Progresso:</span>
                    <span class="progress-value" id="headerPercentage">0%</span>
                </div>
                <div class="progress-bar-mini">
                    <div class="progress-fill-mini" id="headerProgressFill"></div>
                </div>
            </div>

            <div class="header-right">
                <div class="user-section">
                    <div class="user-avatar" id="characterDisplay">🚗</div>
                    <div class="user-name" id="userName">Usuario</div>
                </div>
                <button id="adminBtn" class="btn-admin-gear" title="Configuracoes">⚙️</button>
                <button id="logoutBtn" class="btn-logout">🚪</button>
            </div>
        </header>

        <!-- CONTAINER PRINCIPAL -->
        <div class="main-container">
            <!-- VALOR FLUTUANTE -->
            <div class="valor-display" id="valorDisplay">
